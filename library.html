<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f2f5;
        margin: 0;
        padding: 0;
    }
    h1 {
        text-align: center;
        padding: 20px;
        color: #333;
    }
    .container {
        max-width: 900px;
        margin: auto;
        padding: 10px;
    }
    form {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        margin-bottom: 20px;
    }
    input, button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
        box-sizing: border-box;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover {
        background-color: #0056b3;
    }
    #searchInput {
        padding: 10px;
        margin-bottom: 20px;
        width: 100%;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .book-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
    }
    .book-card {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        position: relative;
    }
    .book-card h3 {
        margin: 0 0 5px 0;
    }
    .book-card p {
        margin: 5px 0;
    }
    .status {
        font-weight: bold;
    }
    .available {
        color: green;
    }
    .borrowed {
        color: red;
    }
    .card-buttons {
        margin-top: 10px;
    }
    .card-buttons button {
        width: 48%;
        margin-right: 4%;
    }
    .card-buttons button:last-child {
        margin-right: 0;
        background-color: red;
    }
</style>
</head>
<body>

<h1>Library Management System</h1>

<div class="container">
    <form id="bookForm">
        <input type="text" id="title" placeholder="Book Title" required>
        <input type="text" id="author" placeholder="Author" required>
        <input type="text" id="category" placeholder="Category" required>
        <input type="text" id="isbn" placeholder="ISBN" required>
        <button type="submit">Add Book</button>
    </form>

    <input type="text" id="searchInput" placeholder="Search by Title, Author, or Category">

    <div class="book-cards" id="bookCards">
        <!-- Book cards will appear here -->
    </div>
</div>

<script>
    let books = JSON.parse(localStorage.getItem('books')) || [];

    function displayBooks(filter = '') {
        const bookCards = document.getElementById('bookCards');
        bookCards.innerHTML = '';
        books.forEach((book, index) => {
            if (book.title.toLowerCase().includes(filter) ||
                book.author.toLowerCase().includes(filter) ||
                book.category.toLowerCase().includes(filter)) {

                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <h3>${book.title}</h3>
                    <p><strong>Author:</strong> ${book.author}</p>
                    <p><strong>Category:</strong> ${book.category}</p>
                    <p><strong>ISBN:</strong> ${book.isbn}</p>
                    <p class="status ${book.status === 'Borrowed' ? 'borrowed' : 'available'}"><strong>Status:</strong> ${book.status}</p>
                    <div class="card-buttons">
                        <button onclick="toggleStatus(${index})">${book.status === 'Borrowed' ? 'Return' : 'Borrow'}</button>
                        <button onclick="deleteBook(${index})">Delete</button>
                    </div>
                `;
                bookCards.appendChild(card);
            }
        });
    }

    function addBook(e) {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const author = document.getElementById('author').value.trim();
        const category = document.getElementById('category').value.trim();
        const isbn = document.getElementById('isbn').value.trim();

        if(title && author && category && isbn){
            books.push({title, author, category, isbn, status: 'Available'});
            localStorage.setItem('books', JSON.stringify(books));
            displayBooks();
            document.getElementById('bookForm').reset();
        }
    }

    function deleteBook(index) {
        if(confirm("Are you sure you want to delete this book?")){
            books.splice(index, 1);
            localStorage.setItem('books', JSON.stringify(books));
            displayBooks();
        }
    }

    function toggleStatus(index) {
        books[index].status = books[index].status === 'Available' ? 'Borrowed' : 'Available';
        localStorage.setItem('books', JSON.stringify(books));
        displayBooks();
    }

    document.getElementById('bookForm').addEventListener('submit', addBook);
    document.getElementById('searchInput').addEventListener('input', (e) => {
        displayBooks(e.target.value.toLowerCase());
    });

    displayBooks();
</script>

</body>
</html>
